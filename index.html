<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Arte Clásico</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">🎨</div>
        <nav>
            <a href="#" class="active">Inicio</a>
            <a href="#obras">Obras</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

    <main>
        <!-- Hero con partículas -->
        <section class="hero" id="hero">
            <canvas id="particlesCanvas"></canvas>
            <div class="hero-content">
                <h1>Historia del Arte</h1>
                <p>Las obras maestras que definieron la humanidad</p>
                <a href="#obras" class="btn" id="exploreBtn">Explorar</a>
            </div>
            <div class="hero-overlay"></div>
        </section>

        <!-- Galería de obras -->
        <section id="obras" class="gallery">
            <h2>Obras Maestras</h2>
            <div class="grid" id="grid"></div>
        </section>

        <!-- Modal -->
        <section class="modal" id="modal">
            <div class="modal-content">
                <span class="close" id="close">&times;</span>
                <div class="modal-body">
                    <div class="modal-image" id="modalImage"></div>
                    <div class="modal-text">
                        <h2 id="modalTitle"></h2>
                        <p class="author" id="modalAuthor"></p>
                        <p class="year" id="modalYear"></p>
                        <div class="description" id="modalDescription"></div>
                        <p class="history-title">Historia</p>
                        <div class="history" id="modalHistory"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Galería de Arte Clásico</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
